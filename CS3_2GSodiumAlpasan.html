<!DOCTYPE html>
<html>
<head>
<title>Application Form</title>

<style>
body{
font-family: Arial;
background:#f1f1f1;
}

form{
width:400px;
margin:30px auto;
padding:20px;
background:white;
border:1px solid #bdbdbd;
}

fieldset{margin-bottom:15px;}

label{
display:block;
margin-bottom:10px;
}

input,select,textarea{
width:100%;
padding:5px;
}

.error{
border:2px solid orangered;
}
</style>

<script>

function confirmSubmit(){
if(confirm("Do you want to submit this form?")){
saveData();
return false;
}
return false;
}

function confirmReset(){
return confirm("Do you want to reset the form?");
}

function checkEmpty(field){
if(field.value.trim()==""){
field.classList.add("error");
}
else{
field.classList.remove("error");
}
}

function saveData(){

let signup = {

id: document.getElementById("id").value,
name: document.getElementById("name").value,
birthday: document.getElementById("birthday").value,
email: document.getElementById("email").value,
mobile: document.getElementById("mobile").value,
grade: document.getElementById("grade").value,
status: document.querySelector('input[name="status"]:checked').value,
club: document.getElementById("club").value,
reason: document.getElementById("reason").value

};

let data = localStorage.getItem("signups");

if(data){
data = JSON.parse(data);
}
else{
data = [];
}

data.push(signup);

localStorage.setItem("signups",JSON.stringify(data));

alert("Signup Saved!");

document.getElementById("signupForm").reset();
}

function viewSignups(){
window.location="CS3_3GSodiumAlpasan.html";
}

</script>
</head>

<body>

<form id="signupForm"
onsubmit="return confirmSubmit()"
onreset="return confirmReset()">

<fieldset>
<legend>Personal Information</legend>

<label>
Student ID:
<input type="number" id="id" required onblur="checkEmpty(this)">
</label>

<label>
Full Name:
<input type="text" id="name" required onblur="checkEmpty(this)">
</label>

<label>
Birthday:
<input type="date" id="birthday" required>
</label>

<label>
Email Address:
<input type="email" id="email" required>
</label>

</fieldset>

<fieldset>
<legend>Organization Details</legend>

<label>
Mobile Phone:
<input type="text" id="mobile" required>
</label>

<label>
Grade Level:
<select id="grade" required>
<option value="">Select</option>
<option>Grade 9</option>
<option>Grade 10</option>
<option>Grade 11</option>
<option>Grade 12</option>
</select>
</label>

<label>
Intern / Extern:
<input type="radio" name="status" value="Intern" required> Intern
<input type="radio" name="status" value="Extern"> Extern
</label>

<label>
Preferred Organization / Club:
<select id="club" required>
<option value="">Select</option>
<option>Computron</option>
<option>Likha</option>
<option>Alianti</option>
<option>Himig Agham</option>
<option>Karyo Biomedical Society</option>
</select>
</label>

<label>
Why do you want to join:
<textarea id="reason" required></textarea>
</label>

</fieldset>

<input type="submit" value="Submit">
<input type="reset" value="Reset">
<input type="button" value="View Signups" onclick="viewSignups()">

</form>

</body>
</html>
