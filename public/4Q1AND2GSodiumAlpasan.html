<!DOCTYPE html>
<html>
<head>
<title>Movie Rating</title>

<style>

body{
font-family: Arial;
background:#f2f2f2;
}

.container{
width:420px;
margin:auto;
margin-top:40px;
background:#e9e9e9;
padding:20px;
border-radius:8px;
}

h2{
text-align:center;
}

input,select{
width:100%;
padding:8px;
margin:8px 0;
}

button{
width:100%;
padding:10px;
background:#1e73d8;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

.deleteBtn{
width:auto;
padding:5px 10px;
background:red;
margin-left:10px;
}

.stars span{
font-size:22px;
cursor:pointer;
color:lightgray;
}

.movie{
background:white;
padding:8px;
margin-top:8px;
border-radius:5px;
}

.yellow{
color:gold;
}

.deleteBtn{
width:auto;
padding:3px 10px;
margin-left:10px;
background:#eee;
color:black;
border:1px solid #999;
border-radius:3px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h2>Add / Update a Movie Rating</h2>

<form id="movieForm">

<label>Title:</label>
<input type="text" id="title" required>

<label>Year:</label>
<input type="number" id="year" required>

<label>Genre:</label>
<select id="genre">
<option>Action</option>
<option>Comedy</option>
<option>Drama</option>
<option>Horror</option>
<option>Romance</option>
</select>

<label>Rating:</label>

<div class="stars" id="stars">
<span data-value="1">★</span>
<span data-value="2">★</span>
<span data-value="3">★</span>
<span data-value="4">★</span>
<span data-value="5">★</span>
</div>

<br>

<button type="submit">Add Movie</button>

</form>

<h2>Movie List</h2>
<div id="movieList"></div>

</div>

<script>

let rating = 0
const stars = document.querySelectorAll("#stars span")

stars.forEach((star,i)=>{
star.onclick=function(){

rating = i+1

stars.forEach(s=>s.style.color="lightgray")

for(let x=0;x<rating;x++){
stars[x].style.color="gold"
}

}
})

document.getElementById("movieForm").onsubmit=function(e){

e.preventDefault()

let title=document.getElementById("title").value
let year=document.getElementById("year").value
let genre=document.getElementById("genre").value

let movies=JSON.parse(localStorage.getItem("movies"))||[]

let found=false

for(let i=0;i<movies.length;i++){

if(movies[i].title==title){

movies[i].year=year
movies[i].genre=genre
movies[i].rating=Math.round((movies[i].rating+rating)/2)

found=true
}

}

if(!found){

movies.push({
title:title,
year:year,
genre:genre,
rating:rating
})

}

localStorage.setItem("movies",JSON.stringify(movies))

displayMovies()

this.reset()

stars.forEach(s=>s.style.color="lightgray")
rating=0

}

function deleteMovie(i){

if(confirm("Delete this movie?")){

let movies=JSON.parse(localStorage.getItem("movies"))||[]

movies.splice(i,1)

localStorage.setItem("movies",JSON.stringify(movies))

displayMovies()

}

}

function displayMovies(){

let list=document.getElementById("movieList")

let movies=JSON.parse(localStorage.getItem("movies"))||[]

list.innerHTML=""

for(let i=0;i<movies.length;i++){

let star=""

for(let x=0;x<movies[i].rating;x++){
star+="<span class='yellow'>★</span>"
}

list.innerHTML+=`
<div class="movie">
${movies[i].title} (${movies[i].year}) - ${movies[i].genre}, Rating: ${star}
<button class="deleteBtn" onclick="deleteMovie(${i})">Delete</button>
</div>
`

}

}

displayMovies()


</script>

</body>
</html>
